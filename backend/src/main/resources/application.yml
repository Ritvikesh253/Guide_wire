server:
  port: 8080

spring:
  application:
    name: payassure

  # ── MySQL Database ──────────────────────────────────────────────────────────
  datasource:
    url: jdbc:mysql://localhost:3306/payassure?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:extinction@7}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update        # creates/updates tables automatically on startup
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

# ── PayAssure Config ──────────────────────────────────────────────────────────
payassure:

  jwt:
    secret: payassure-super-secret-key-minimum-32-chars-change-in-prod-2024
    expiry-ms: 86400000       # 24 hours

  # ── Setu Aadhaar API (UIDAI sandbox) ─────────────────────────────────────
  # Register free at: https://setu.co/products/kyc/aadhaar-api/
  # Sandbox test Aadhaar numbers:
  #   Male   → 999941057058
  #   Female → 999971658847
  setu:
    base-url: https://dg-sandbox.setu.co
    client-id: ${SETU_CLIENT_ID:your-setu-client-id-here}
    client-secret: ${SETU_CLIENT_SECRET:your-setu-client-secret-here}

  # ── UIDAI Direct AUA (optional — needs UIDAI empanelment) ────────────────
  uidai:
    base-url: https://stage1.uidai.gov.in/onlineOtpService
    aua-code: public
    license-key: ${UIDAI_LICENSE_KEY:MEaCgYDVR0PBBYwFAYIKwYBBQUFBwME}

  # ── Razorpay (mock penny drop for now) ───────────────────────────────────
  razorpay:
    key-id: ${RAZORPAY_KEY_ID:rzp_test_xxxx}
    key-secret: ${RAZORPAY_KEY_SECRET:xxxx}

  # ── Feature 2: ML-Driven Premium Calculation ─────────────────────────────
  openweather:
    api-key: ${OPENWEATHER_API_KEY:demo-key}
    base-url: https://api.openweathermap.org
  
  openelevation:
    base-url: https://api.open-elevation.com

  # ── Feature 3: Parametric Automation ─────────────────────────────────────
  disruption:
    polling-interval-seconds: 60
    mock-api-url: ${DISRUPTION_MOCK_API_URL:http://localhost:8090/api/disruptionEvents}

  # ── Feature 4: Instant Payouts ──────────────────────────────────────────
  payouts:
    provider: razorpayX              # razorpayX | stripe | walletconnect
    razorpayx:
      account-number: ${RAZORPAYX_ACCOUNT_NUMBER:2121021200061746}
      account-username: ${RAZORPAYX_USERNAME:default}
      account-password: ${RAZORPAYX_PASSWORD:default}
    default-claim-amount: 500        # ₹500 per disruption claim
    settlement-mode: UPI             # UPI / NEFT / IMPS

  # ── Feature 5: Aadhaar ID Matching & Real Selfie Validation ──────────────
  face-matching:
    provider: ${FACE_PROVIDER:mock}  # mock | aws-rekognition | google-vision | local-opencv
    confidence-threshold: 0.85
    max-retries: 3
    mock-mode: ${MOCK_FACE_MATCHING:true}
    mock-confidence: 0.95
    
    # AWS Rekognition
    aws:
      region: ap-south-1
      access-key: ${AWS_ACCESS_KEY_ID}
      secret-key: ${AWS_SECRET_ACCESS_KEY}
    
    # Google Cloud Vision
    google:
      project-id: ${GOOGLE_CLOUD_PROJECT_ID}
      credentials-json: ${GOOGLE_CLOUD_CREDENTIALS_JSON}
    
    # Local Python ML Service
    python:
      service-url: http://localhost:5000
      timeout-seconds: 10
  
  ocr:
    provider: google-vision          # google-vision | tesseract | aws-textract
    mock-mode: ${MOCK_OCR:true}
    aadhaar-pattern: ^\d{12}$
    name-similarity-threshold: 0.85

  # ── Feature 1: Zone Selection & Geospatial ──────────────────────────────
  zones:
    default-city: Chennai
    default-center-lat: 13.0827
    default-center-lon: 80.2707
    map-zoom-default: 11
    
logging:
  level:
    com.payassure: INFO
    com.payassure.service.ParametricAutomationService: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
    org.springframework.web: INFO
